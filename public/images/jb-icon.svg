<svg xmlns="http://www.w3.org/2000/svg" width="512" height="512" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a1a3e"/>
      <stop offset="100%" style="stop-color:#2d2b55"/>
    </linearGradient>
    <linearGradient id="accentGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#c8f542"/>
      <stop offset="100%" style="stop-color:#a3d935"/>
    </linearGradient>
    <style>
      @import url('https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&amp;display=swap');
    </style>
  </defs>
  
  <!-- Background rounded square -->
  <rect width="512" height="512" rx="96" ry="96" fill="url(#bgGrad)"/>
  
  <!-- Subtle decorative line (matches the hero dash on your site) -->
  <line x1="80" y1="140" x2="160" y2="140" stroke="url(#accentGrad)" stroke-width="5" stroke-linecap="round"/>
  
  <!-- J letter -->
  <text x="108" y="370" font-family="'DM Serif Display', Georgia, serif" font-size="280" font-weight="400" fill="#ffffff" letter-spacing="-10">J</text>
  
  <!-- B letter in accent green, italic -->
  <text x="268" y="370" font-family="'DM Serif Display', Georgia, serif" font-size="280" font-weight="400" font-style="italic" fill="url(#accentGrad)" letter-spacing="-10">B</text>
  
  <!-- Small dot accent -->
  <circle cx="432" cy="380" r="10" fill="url(#accentGrad)" opacity="0.7"/>
</svg>
